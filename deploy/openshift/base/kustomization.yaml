apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- backend-deployment.yaml
- backend-service.yaml
- backend-pvc.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- frontend-route.yaml
- api-route.yaml
- serviceaccount.yaml
- cronjob-sync-refresh.yaml
- chatbot-deployment.yaml
- chatbot-service.yaml

configMapGenerator:
- literals:
  - NODE_ENV=production
  - API_PORT=3001
  - JIRA_HOST=https://redhat.atlassian.net
  - ADMIN_EMAILS=
  - CRON_ADMIN_EMAIL=
  - CHATBOT_SERVICE_URL=http://chatbot:8002
  name: team-tracker-config
- files:
  - app.conf.template=nginx-app.conf.template
  name: nginx-config-template
- literals:
  - CHATBOT_PORT=8002
  - ORG_PULSE_API_URL=http://backend:3001
  name: chatbot-config

images:
- name: quay.io/org-pulse/org-pulse-core-backend
  newTag: 4b3ef64a62695f478fbda8e485276ed556c7b368
- name: quay.io/org-pulse/org-pulse-core-frontend
  newTag: 4b3ef64a62695f478fbda8e485276ed556c7b368
